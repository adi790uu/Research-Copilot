<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Pith</title>
    <meta
      name="description"
      content="Pith researches a company and prepares a structured, cited briefing for your next meeting — then stays with you through the follow-up."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,200..900,30..100,0..1;1,9..144,200..900,30..100,0..1&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
    />

    <script>
      (function () {
        var theme = "dark";
        try {
          var url = new URL(window.location.href);
          var param = url.searchParams.get("theme");
          if (param === "light" || param === "dark") {
            theme = param;
          } else {
            try {
              var stored = localStorage.getItem("theme");
              if (stored === "light" || stored === "dark") theme = stored;
              else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
                theme = "light";
            } catch (_) {}
          }
        } catch (_) {}
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
